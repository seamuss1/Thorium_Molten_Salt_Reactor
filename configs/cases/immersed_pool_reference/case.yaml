name: immersed_pool_reference
reactor:
  name: Immersed Pool MSR Reference
  family: reference-inspired immersed pool MSR demonstrator
  stage: full-core
  property_reference_temperature_c: 600.0
  design_power_mwth: 8.0
  hot_leg_temp_c: 690.0
  cold_leg_temp_c: 555.0
  primary_cp_kj_kgk: 1.6
  primary_dynamic_viscosity_pa_s: 0.012
  primary_pump_efficiency: 0.74
  primary_elbow_loss_coefficient: 0.9
  primary_terminal_loss_coefficient: 1.6
  primary_loop_ambient_temp_c: 470.0
  primary_pipe_overall_u_w_m2k: 7.5
  steam_generator_effectiveness: 0.91
  steam_generator_overall_u_w_m2k: 820.0
  hx_primary_hydraulic_diameter_m: 0.032
  hx_secondary_hydraulic_diameter_m: 0.024
  hx_primary_flow_area_m2: 0.0105
  hx_secondary_flow_area_m2: 0.0115
  secondary_inlet_temp_c: 430.0
  secondary_outlet_temp_c: 585.0
  secondary_density:
    units: kg/m3
    model: linear
    reference_value: 3025.0
    reference_temperature_c: 500.0
    slope_per_c: -0.62
  secondary_cp:
    units: j/kg-k
    model: linear
    reference_value: 1650.0
    reference_temperature_c: 500.0
    slope_per_c: 0.28
  secondary_dynamic_viscosity:
    units: pa-s
    model: arrhenius
    pre_exponential: 0.0019
    activation_temperature_k: 1080.0
  secondary_thermal_conductivity:
    units: w/m-k
    model: constant
    value: 0.88
  turbine_efficiency: 0.41
  generator_efficiency: 0.98
  fuel_heavy_metal_mass_fraction: 0.013
  fissile_mass_fraction_of_heavy_metal: 0.065
  cleanup_turnover_days: 10.0
  cleanup_removal_efficiency: 0.78
  xenon_yield_fraction: 0.0028
  xenon_removal_fraction: 0.9
  protactinium_holdup_days: 2.0
  benchmark: benchmarks/tmsr_lf1/benchmark.yaml
materials:
  fuel_salt:
    name: fuel_salt
    density:
      units: kg/m3
      model: linear
      reference_value: 3225.0
      reference_temperature_c: 600.0
      slope_per_c: -0.72
    cp:
      units: j/kg-k
      model: linear
      reference_value: 1580.0
      reference_temperature_c: 600.0
      slope_per_c: 0.35
    dynamic_viscosity:
      units: pa-s
      model: arrhenius
      pre_exponential: 0.0023
      activation_temperature_k: 1225.0
    thermal_conductivity:
      units: w/m-k
      model: constant
      value: 1.08
    nuclides:
      - { name: Li7, ao: 0.325 }
      - { name: F19, ao: 0.5648333333 }
      - { name: Be9, ao: 0.0966666667 }
      - { name: Zr90, ao: 0.005145 }
      - { name: Zr91, ao: 0.001122 }
      - { name: Zr92, ao: 0.001715 }
      - { name: Zr94, ao: 0.001738 }
      - { name: Zr96, ao: 0.000280 }
      - { name: Th232, ao: 0.001500 }
      - { name: U233, ao: 0.000120 }
      - { name: U238, ao: 0.001880 }
  coolant_salt:
    name: coolant_salt
    density:
      units: kg/m3
      model: linear
      reference_value: 3010.0
      reference_temperature_c: 500.0
      slope_per_c: -0.58
    nuclides:
      - { name: Li7, ao: 0.44 }
      - { name: F19, ao: 0.42 }
      - { name: Be9, ao: 0.14 }
  graphite:
    name: graphite
    density: { units: g/cm3, value: 1.8 }
    elements:
      - { name: C, ao: 1.0 }
  pipe:
    name: pipe
    density: { units: g/cm3, value: 8.9 }
    elements:
      - { name: Ni, ao: 0.71 }
      - { name: Mo, ao: 0.17 }
      - { name: Cr, ao: 0.07 }
      - { name: Fe, ao: 0.05 }
  insulation:
    name: insulation
    density: { units: g/cm3, value: 2.4 }
    elements:
      - { name: Al, ao: 0.4 }
      - { name: O, ao: 0.6 }
  air:
    name: air
    density: { units: g/cm3, value: 0.00018 }
    elements:
      - { name: He, ao: 1.0 }
geometry:
  kind: ring_lattice_core
  style: detailed_msr
  pitch: 220.0
  boundary: reflective
  axial_boundary: vacuum
  core_radius: 20.5
  plenum_radius: 13.5
  reflector_outer_radius: 24.0
  downcomer_liner_outer_radius: 25.2
  downcomer_outer_radius: 29.8
  vessel_outer_radius: 31.6
  guard_gap_outer_radius: 33.6
  guard_vessel_outer_radius: 36.2
  matrix_material: graphite
  salt_material: fuel_salt
  structure_material: pipe
  background_material: air
  height_cm: 76.0
  lower_plenum_height_cm: 10.0
  active_core_height_cm: 52.0
  upper_plenum_height_cm: 8.0
  cover_gas_height_cm: 6.0
  channel_layers:
    - { name: moderator_center, material: graphite, inner_radius: 0.0, outer_radius: 0.22 }
    - { name: fuel_annulus, material: fuel_salt, inner_radius: 0.2201, outer_radius: 0.34, tag_as: fuel }
    - { name: gas_gap_inner, material: null, inner_radius: 0.34, outer_radius: 0.35 }
    - { name: primary_pipe, material: pipe, inner_radius: 0.35, outer_radius: 0.42 }
    - { name: gas_gap_outer, material: null, inner_radius: 0.4201, outer_radius: 0.52 }
  special_channels:
    control_guides:
      ring_radius: 8.2
      every: 2
      layers:
        - { name: control_void, material: air, inner_radius: 0.0, outer_radius: 0.14, tag_as: control }
        - { name: guide_tube, material: pipe, inner_radius: 0.1401, outer_radius: 0.22 }
        - { name: bypass_salt, material: fuel_salt, inner_radius: 0.2201, outer_radius: 0.31 }
        - { name: guide_graphite, material: graphite, inner_radius: 0.3101, outer_radius: 0.52 }
    instrumentation_wells:
      ring_radius: 16.4
      every: 4
      start_index: 1
      layers:
        - { name: sensor_well, material: air, inner_radius: 0.0, outer_radius: 0.11, tag_as: instrumentation }
        - { name: sensor_sheath, material: pipe, inner_radius: 0.1101, outer_radius: 0.17 }
        - { name: purge_annulus, material: air, inner_radius: 0.1701, outer_radius: 0.25 }
        - { name: shield_graphite, material: graphite, inner_radius: 0.2501, outer_radius: 0.52 }
  rings:
    - { radius: 0.0, count: 1 }
    - { radius: 4.1, count: 6 }
    - { radius: 8.2, count: 12 }
    - { radius: 12.3, count: 18 }
    - { radius: 16.4, count: 24 }
  render_layout:
    type: immersed_pool_reference
    core_offset_x_cm: 24.0
    core_offset_y_cm: -8.0
    pool:
      radius_cm: 64.0
      wall_thickness_cm: 1.8
      top_z_cm: 64.0
      cylinder_bottom_z_cm: -24.0
      bottom_head_depth_cm: 40.0
      fill_top_z_cm: 44.0
      material: coolant_salt
      shell_material: pipe
      shell_opacity: 0.68
      fill_opacity: 0.46
    containment:
      inner_radius_cm: 76.0
      outer_radius_cm: 86.0
      top_z_cm: 80.0
      bottom_z_cm: -74.0
      material: pipe
      opacity: 0.34
    core_box:
      center_x_cm: 24.0
      center_y_cm: -8.0
      outer_width_cm: 54.0
      outer_depth_cm: 54.0
      wall_thickness_cm: 3.8
      base_height_cm: 4.8
      floor_z_cm: -31.0
      cavity_top_z_cm: 36.0
      wall_material: insulation
      cavity_material: coolant_salt
      barrel_radius_cm: 22.0
      riser_material: insulation
      control_material: pipe
      control_riser_top_z_cm: 46.0
    primary_loop:
      components:
        - id: heat_exchanger
          kind: heat_sink
        - id: pump
          kind: pump
        - id: core
          kind: heat_source
      connections:
        - id: hx_to_pump
          from: heat_exchanger
          to: pump
          leg: cold_leg
        - id: pump_to_core
          from: pump
          to: core
          leg: cold_leg
        - id: core_to_hx
          from: core
          to: heat_exchanger
          leg: hot_leg
      heat_exchanger:
        material: insulation
        x_min_cm: -54.0
        x_max_cm: -24.0
        y_cm: -14.0
        z_cm: 16.0
        radius_cm: 4.4
      pump:
        material: pipe
        x_cm: -34.0
        y_cm: -8.0
        z_min_cm: 22.0
        z_max_cm: 34.0
        radius_cm: 2.6
        header_radius_cm: 4.2
      pipes:
        - id: hx_to_pump
          radius_cm: 2.1
          material: pipe
          points:
            - [-24.0, -14.0, 16.0]
            - [-24.0, -14.0, 24.0]
            - [-24.0, -8.0, 24.0]
            - [-34.0, -8.0, 24.0]
        - id: core_to_hx
          radius_cm: 2.1
          material: pipe
          points:
            - [-46.0, -14.0, 16.0]
            - [-46.0, -14.0, -8.0]
            - [6.0, -14.0, -8.0]
            - [6.0, -12.0, -8.0]
            - [22.0, -12.0, -8.0]
        - id: pump_to_core
          radius_cm: 2.0
          material: pipe
          points:
            - [-34.0, -8.0, 34.0]
            - [2.0, -8.0, 34.0]
            - [16.0, -8.0, 34.0]
            - [16.0, -8.0, 26.0]
simulation:
  mode: eigenvalue
  particles: 70000
  batches: 100
  inactive: 20
  source:
    type: point
    parameters: [0.0, 0.0, 0.0]
  tallies:
    - name: fuel_reaction_rates
      cell: fuel
      nuclides: [U233]
      scores: [total, fission, absorption, "(n,gamma)"]
    - name: core_flux
      cell: core_matrix
      scores: [flux]
reporting:
  plots:
    - name: immersed_pool_reference_render
      kind: png
flow:
  core_model:
    kind: channelized_from_geometry
    active_variants: [fuel, control_guides]
    stagnant_variants: [instrumentation_wells]
    family_split_weights:
      fuel: 1.0
      control_guides: 1.0
  reduced_order:
    allocation_rule: pressure_balanced
    active_channel_selection: all_salt_bearing_channels
model_representation:
  materials: isotopic_explicit
  fuel_cycle: proxy_breeding
transient:
  duration_s: 120.0
  time_step_s: 1.0
  power_response_time_s: 2.5
  fuel_temperature_response_time_s: 8.0
  graphite_temperature_response_time_s: 28.0
  coolant_temperature_response_time_s: 12.0
  precursor_inventory_response_time_s: 5.0
  precursor_transport_response_time_s: 3.0
  xenon_response_time_s: 240.0
  fuel_temperature_feedback_pcm_per_c: -3.2
  graphite_temperature_feedback_pcm_per_c: -0.9
  coolant_temperature_feedback_pcm_per_c: -0.5
  precursor_worth_pcm: 180.0
  precursor_transport_model: loop_segment_six_group_advection_decay
  delayed_neutron_precursor_groups:
    - { name: group_1, decay_constant_s: 0.0124, yield_fraction: 0.000215 }
    - { name: group_2, decay_constant_s: 0.0305, yield_fraction: 0.001424 }
    - { name: group_3, decay_constant_s: 0.111, yield_fraction: 0.001274 }
    - { name: group_4, decay_constant_s: 0.301, yield_fraction: 0.002568 }
    - { name: group_5, decay_constant_s: 1.14, yield_fraction: 0.000748 }
    - { name: group_6, decay_constant_s: 3.01, yield_fraction: 0.000273 }
  xenon_worth_pcm_per_fraction: -120.0
  scenarios:
    - name: load_follow_step
      duration_s: 90.0
      time_step_s: 1.0
      events:
        - time_s: 10.0
          reactivity_step_pcm: 60.0
    - name: partial_heat_sink_loss
      duration_s: 120.0
      time_step_s: 1.0
      events:
        - time_s: 20.0
          heat_sink_fraction: 0.7
depletion:
  chain: thorium_u233_cleanup_proxy
  cleanup_scenario: baseline_online_cleanup
  volatile_removal_efficiency: 0.78
  xenon_removal_fraction: 0.9
  protactinium_holdup_days: 2.0
  initial_fissile_inventory_fraction: 1.0
  fissile_burn_fraction_per_day_full_power: 0.0008
  breeding_gain_fraction_per_day: 0.00055
  minor_actinide_sink_fraction_per_day: 0.00012
chemistry:
  model: salt_redox_cleanup_proxy
  target_redox_state_ev: -0.03
  initial_redox_state_ev: -0.02
  redox_control_time_days: 2.0
  oxidant_ingress_fraction_per_day: 0.0002
  impurity_capture_efficiency: 0.65
  gas_stripping_efficiency: 0.88
  noble_metal_plateout_fraction: 0.12
  corrosion_acceleration_per_ev: 4.0
  tritium_release_fraction: 0.35
loop_segments:
  - id: core_to_hx_hot_leg
    residence_fraction: 0.46
    cleanup_weight: 0.3
  - id: heat_exchanger_and_gas_contact
    residence_fraction: 0.32
    cleanup_weight: 1.5
  - id: hx_to_pump_cold_leg
    residence_fraction: 0.12
    cleanup_weight: 0.4
  - id: pump_to_core_return
    residence_fraction: 0.10
    cleanup_weight: 0.4
property_uncertainty:
  model: tmsr_sf0_property_uncertainty_screen
  density_uncertainty_95_fraction: 0.02
  cp_uncertainty_95_fraction: 0.10
  thermal_conductivity_uncertainty_95_fraction: 0.10
  dynamic_viscosity_uncertainty_95_fraction: 0.10
  core_outlet_temperature_uncertainty_95_c: 10.0
tritium:
  model: tmsr_lithium_salt_tritium_distribution_screen
  lithium6_atom_fraction: 0.0005
  reference_power_mwth: 10.0
  unmitigated_environment_fraction: 0.33
  mitigated_environment_fraction: 0.10
  spray_gas_removal_fraction: 0.66
  screening_operation_years: 5.0
  graphite_saturation_years: 5.0
graphite_lifetime:
  model: fast_flux_flattening_graphite_lifetime_screen
  fast_fluence_limit_n_cm2: 3.0e+22
  target_fuel_volume_fraction: 0.08
  core_zoning_flattening_credit: 0.06
  hexagonal_prism_assembly_credit: 0.08
  target_lifespan_years: 8.0
  capacity_factor: 0.85
integrations:
  moose:
    application: app-opt
    executioner: Transient
    end_time: 120.0
    dt: 1.0
  scale:
    sequence: csas6
    executable: scalerte
validation_targets:
  expected_cells:
    metric: expected_cells
    source: metrics
    min: 306
    max: 306
  channel_count:
    metric: channel_count
    source: build_manifest
    min: 61
    max: 61
  keff_pool_band:
    metric: keff
    source: metrics
    min: 0.85
    max: 1.15
