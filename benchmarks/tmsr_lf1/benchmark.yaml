title: TMSR-LF1-inspired surrogate benchmark
references:
  - Public TMSR-LF1 concept descriptions and open molten-salt literature should replace or tighten these bands.
  - Current values are explicitly labeled surrogate acceptance bounds for implementation scaffolding.
  - Wang et al. 2026 RESTA3D 2 MWth TMSR transient analysis, https://doi.org/10.3390/en19040964.
  - Poo 2026 National Science Review editorial on China's fourth-generation reactor progress, https://doi.org/10.1093/nsr/nwaf509.
  - Chinese Academy of Sciences 2025 report of thorium-uranium conversion in the Wuwei molten-salt reactor.
